<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu HTML</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-image: url(https://assets.nflxext.com/ffe/siteui/vlv3/9ddb442a-aca7-4d85-9cd1-dbed62f18f26/web/BR-pt-20251222-TRIFECTA-perspective_d0ce9401-9884-4874-a31d-07a7cb0f026b_medium.jpg);
            background-size: cover;
            background-position: top center;
        }

        #heading {
            display: flex;
            /*background: #e50914;*/
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: space-between;
        }

        #heading h1 {
            padding: 15px;
            font-size: 18px;
            text-transform: uppercase;
        }

         #heading h2 {
            padding: 15px;
            font-size: 18px;
            text-transform: uppercase;
        }

        #heading a {
            color: white;
            text-decoration: none;
            font-family: sans-serif;

    </style>
</head>

<body>
    <header id="heading">
        <h1 class="h1">
            <a href="#">Netflix</a>
        </h1>

        <h2 class="h1">
            <a href="#">Sair</a>
        </h2>
    </header>
</body>
</html>

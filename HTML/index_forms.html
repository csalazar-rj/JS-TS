<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>

    <style>
        body {
            font-family: sans-serif;
        }

        label {
            cursor: pointer;
        }

    </style>

</head>
<body>
        
    <form action="#" method="get" target="_blank" autocomplete="off">
        <p>Understanding the Forms</p>
        <p>
            <label for="nome"> Nome:</label>
            <input type="text" name="nome" id="nome" placeholder="seu nome" required>            
        </p>
        <p>
            <label for="status">Paciente Ativo</label>
            <input type="checkbox" id="status" name="status" value="sim">
        </p>
        <p>
            Gênero:
            <br><br>
            <input type="radio" id="feminino" name="genero">
            <label for="feminino">Feminino</label>
            <br>
            <input type="radio" id="masculino" name="genero">
            <label for="masculino">Masculino</label>
            <br>
            <input type="radio" id="outros" name="genero">
            <label for="outros">Outro</label>

        </p>
        <p>
            <label for="dtnasc">Dt Nascimento:</label>
            <input type="date" id="dtnasc" name="dtnasc">
        </p>

        <p>
            <label for="emil">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="ex.: email@email.com">
        </p>

        <p>
            <label for="receituario">Receituário</label>
            <input type="file" id="receituario" name="receituario" accept=".docx, .xlsx">
        </p>

        <p>
            <label for="idade">Idade:</label>
            <input type="number" id="number" name="number" min="15" max="100">
        </p>
    
        <p>
            <label for="select">Seleciona a sua cidade:</label>
            <select name="select" id="select">
                <option value="opt1" label="Opção 1">
                <option value="opt2" label="Opção 2"> 
                <option value="opt3" label="Opção 3"> 
                <option value="opt4" label="Opção 4"> 
            </select>
        </p>

        <p>
            <label for="textarea">Observação:</label>
            <textarea name="textarea" id="textarea"></textarea>
        </p>
    
        <br>
        <p>
            <label for="lastupdttm">Última Atualização</label>
            <input type="datetime-local" id="lastupdttm" name="lastupdttm">
        </p>


        <button type="reset">Reset</button>
        <button type="submit">Enviar</button>

    </form>
    
</body>
</html>
